name: Latest book list from a goodreads

on:
  schedule:
    - cron: "15 5 * * 1"
  workflow_dispatch:

jobs:
  update-readme-with-goodreads-books:
    name: Update this repo's README with goodreads books
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Update README with Goodreads books
        env:
          GOODREADS_USER_ID: "156149291"
        run: |
          python3 << 'EOF'
          import requests, re, os, xml.etree.ElementTree as ET
          USER_ID = os.environ["GOODREADS_USER_ID"]
          def fetch_shelf(shelf):
              url = f"https://www.goodreads.com/review/list_rss/{USER_ID}?shelf={shelf}&per_page=200"
              r = requests.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=15)
              r.raise_for_status()
              root = ET.fromstring(r.content)
              items = root.findall(".//item")
              books = []
              for item in items:
                  def t(tag): return (item.findtext(tag) or "").strip()
                  books.append({
                      "title": t("title"),
                      "url": t("link"),
                      "author": t("author_name"),
                      "avg": t("average_rating"),
                      "my_rating": t("user_rating"),
                  })
              return books
          def replace_section(readme, tag, content):
              pattern = rf"(<!-- {tag}:START -->).*?(<!-- {tag}:END -->)"
              replacement = f"<!-- {tag}:START -->\n{content}\n<!-- {tag}:END -->"
              return re.sub(pattern, replacement, readme, flags=re.DOTALL)
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()
          books = fetch_shelf("currently-reading")
          lines = "\n".join(f"- [{b['title']}]({b['url']}) by {b['author']}. Avarage Rating: {b['avg']}" for b in books)
          readme = replace_section(readme, "GOODREADS-LIST", lines)
          books = fetch_shelf("read")
          lines = "\n".join(f"- [{b['title']}]({b['url']}) by {b['author']}. My Rating/Average Rating: {b['my_rating']}/{b['avg']}" for b in books)
          readme = replace_section(readme, "GOODREADS-READ-LIST", lines)
          books = fetch_shelf("to-read")
          lines = "\n".join(f"- [{b['title']}]({b['url']}) by {b['author']}. Average Rating: {b['avg']}" for b in books)
          readme = replace_section(readme, "GOODREADS-TO-READ-LIST", lines)
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme)
          print("README updated successfully.")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (
            git commit -m "docs: update goodreads book lists" &&
            git pull --rebase origin main &&
            git push
          )